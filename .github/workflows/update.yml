name: Auto-update NBA data

on:
  schedule:
    # Runs every day at 06:10 UTC (adjust as you wish)
    - cron: "10 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # <-- required to push changes back

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0     # needed so we can commit & push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib requests

      - name: Run auto update
        env:
          # Use workspace to be explicit about paths if needed
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python auto_update.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Auto-update: $(date -u +"%Y-%m-%d %H:%M:%S") UTC"
            git push
          else
            echo "No changes to commit."
          fi
